<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Veritasic Demos</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --navy:    #002147;
  --navy-mid:#0A3560;
  --red:     #C41E3A;
  --green:   #005A30;
  --amber:   #D97706;
  --page-bg: #F2F1EE;
  --white:   #FFFFFF;
  --rule:    #C0BDB5;
  --rule-lt: #E0DED8;
  --text:    #1A1A1A;
  --muted:   #666660;
  --label:   #888880;
  --serif:   'Playfair Display', Georgia, 'Times New Roman', serif;
  --sans:    'Helvetica Neue', Helvetica, Arial, sans-serif;
}
body {
  font-family: var(--sans);
  font-size: 13px;
  background: var(--page-bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* HERO */
.hero {
  background: var(--navy);
  padding: 52px 32px 48px;
  text-align: center;
  border-bottom: 3px solid var(--red);
}
.hero-eyebrow {
  font-size: 9px;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  color: #8AABCF;
  margin-bottom: 12px;
}
.hero-title {
  font-family: var(--serif);
  font-size: 36px;
  font-weight: 700;
  color: #fff;
  line-height: 1.15;
  margin-bottom: 10px;
}
.hero-sub {
  font-size: 13px;
  color: #8AABCF;
  max-width: 480px;
  margin: 0 auto;
  line-height: 1.6;
}

/* MAIN */
.main {
  flex: 1;
  max-width: 760px;
  margin: 0 auto;
  padding: 44px 32px 80px;
  width: 100%;
}

.category {
  margin-bottom: 36px;
}
.category-label {
  font-size: 8px;
  font-weight: 700;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  color: var(--label);
  padding-bottom: 8px;
  border-bottom: 1px solid var(--rule-lt);
  margin-bottom: 4px;
}
.file-row {
  display: flex;
  align-items: baseline;
  gap: 12px;
  padding: 11px 0;
  border-bottom: 1px solid var(--rule-lt);
}
.file-link {
  font-size: 14px;
  font-weight: 600;
  color: var(--navy);
  text-decoration: none;
  flex-shrink: 0;
}
.file-link:hover { text-decoration: underline; color: #1C3A62; }
.file-date {
  font-size: 11px;
  color: var(--label);
  white-space: nowrap;
}
.file-desc {
  font-size: 11px;
  color: var(--muted);
  flex: 1;
}

@media (max-width: 600px) {
  .hero { padding: 36px 20px 32px; }
  .hero-title { font-size: 26px; }
  .main { padding: 28px 16px 40px; }
  .file-row { flex-wrap: wrap; gap: 6px; }
}
</style>
</head>
<body>

<!-- Hero -->
<div class="hero">
  <div class="hero-title">Demo App Workspace</div>
  <div class="hero-sub">Live demos hosted on this domain.</div>
</div>

<!-- Main -->
<div class="main">

  <div class="category">
    <div class="category-label">Risk &amp; Asset Management</div>
    <div class="file-row">
      <a class="file-link" href="/equipment-risk-tower/">Equipment Risk Control Tower</a>
      <span class="file-date">Pilot</span>
      <span class="file-desc">Asset-level risk scoring, escalations &amp; action tracking</span>
    </div>
  </div>

</div>

</body>
</html>
